<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    FinTrack favicon — brand emerald background + white TrendingUp arrow.
    background_color in manifest.json matches this green (#10B981) so the
    Android adaptive icon looks "filled" rather than showing a black square.

    Geometry mirrors generate-pwa-icons.mjs (size=512, non-maskable):
      arrowSz = round(512 * 0.47) = 241,  sc = 241/24 ≈ 10.04
      origin  = (256 - 241/2, 256 - 241/2) = (135.5, 135.5)
      sw      = round(10.04 * 2.8) = 28
  -->

  <!-- Emerald green background -->
  <rect width="512" height="512" fill="#10B981"/>

  <!-- TrendingUp — arrow indicator: M16 7 H22 V13 -->
  <polyline
    points="296.2,205.8 356.4,205.8 356.4,266.0"
    fill="none" stroke="white" stroke-width="28"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- TrendingUp — trend line: M22 7 L13.5 15.5 L8.5 10.5 L2 17 -->
  <polyline
    points="356.4,205.8 271.1,291.2 220.9,240.9 155.6,306.2"
    fill="none" stroke="white" stroke-width="28"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
